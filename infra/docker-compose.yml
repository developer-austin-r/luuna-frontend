services:
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: luuna-frontend-app
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    networks:
      - luuna-network

networks:
  luuna-network:
    driver: bridge
