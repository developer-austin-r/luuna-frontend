name: Frontend Pull Request CI

# Pre-merge validation only. This workflow never builds images or deploys.
on:
  pull_request:
    branches:
      - main

# Cancel an outdated run when new commits are pushed to the same pull request.
concurrency:
  group: frontend-pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-quality-and-build:
    name: Frontend — lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4

      # Node 24 matches the application's supported/runtime version.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Commands fail the job immediately when they return a non-zero status.
      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build
